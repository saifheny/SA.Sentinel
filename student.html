    <style>
      body {
        overflow-x: hidden;
      }
      .ambient-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: var(--bg);
        overflow: hidden;
      }
      .ambient-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.5;
        animation: orbFloat 25s infinite alternate ease-in-out;
      }
      .orb-1 {
        width: 45vw;
        height: 45vw;
        background: var(--accent-glow);
        top: -10%;
        left: -10%;
      }
      .orb-2 {
        width: 35vw;
        height: 35vw;
        background: var(--green-glow);
        bottom: -10%;
        right: -10%;
        animation-delay: -5s;
      }
      .grid-pattern {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: perspective(500px) rotateX(60deg) translateY(-100px)
          translateZ(-200px);
        animation: gridMove 20s linear infinite;
        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 40%,
          transparent 90%
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent,
          black 40%,
          transparent 90%
        );
      }
      @keyframes gridMove {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 0 50px;
        }
      }
      @media (max-width: 768px) {
        .ambient-orb,
        .grid-pattern {
          display: none !important;
        }
      }
      .icon-wrap {
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: float 5s ease-in-out infinite;
      }
      .exam-input-wrap {
        display: flex;
        gap: 0;
        max-width: 420px;
        margin: 2rem auto;
        position: relative;
        background: var(--glass2);
        border: 1px solid var(--glass-border);
        border-radius: 99px;
        box-shadow: var(--shadow-sm);
        padding: 5px;
        transition: all 0.3s var(--spring);
      }
      .exam-input-wrap:focus-within {
        border-color: var(--accent);
        box-shadow:
          0 0 0 4px var(--accent-soft),
          var(--shadow);
        transform: translateY(-2px);
      }
      .exam-input-wrap .field {
        background: transparent;
        border: none;
        box-shadow: none;
        font-size: 1.05rem;
        padding: 12px 16px 12px 8px;
        border-radius: 99px;
        backdrop-filter: none;
        color: var(--text);
        width: 100%;
        transition: all 0.3s var(--spring);
      }
      .exam-input-wrap .field:focus {
        background: transparent;
        transform: none;
        box-shadow: none;
      }
      .exam-input-wrap .field::placeholder {
        color: var(--text3);
      }
      .exam-input-wrap .inline-enter {
        flex-shrink: 0;
        padding: 10px 22px;
        border-radius: 99px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        font-size: 0.85rem;
        font-weight: 800;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.3s var(--spring);
        box-shadow: 0 4px 16px var(--accent-glow);
        white-space: nowrap;
      }
      .exam-input-wrap .inline-enter:hover {
        filter: brightness(1.1);
        box-shadow: 0 6px 22px var(--accent-glow);
        transform: scale(1.04);
      }
      .exam-input-wrap .inline-enter:active {
        transform: scale(0.96);
      }
      .footer-links {
        text-align: center;
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 1px solid var(--glass-border);
      }
      .social-btns {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin: 1rem 0;
      }
      .social-btns a {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--glass2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        color: var(--text);
        border: 1px solid var(--glass-border);
        transition: all 0.3s var(--spring);
      }
      .social-btns a:hover {
        transform: translateY(-4px) scale(1.1);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }
      .social-btns a.fb:hover {
        background: #1877f2;
        border-color: #1877f2;
      }
      .social-btns a.wa:hover {
        background: #25d366;
        border-color: #25d366;
      }
      .social-btns a.tg:hover {
        background: #0088cc;
        border-color: #0088cc;
      }
      .stu-float-account {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1001;
        animation: entryBlur 0.7s var(--ease) 0.1s both;
      }
      @media (max-width: 768px) {
        .stu-float-account {
          top: 16px;
          left: 16px;
        }
        .exam-input-wrap .inline-enter {
          padding: 9px 16px;
          font-size: 0.78rem;
        }
      }
      .split-layout {
        display: flex;
        flex-direction: row-reverse;
        width: 100%;
        min-height: 100vh;
        position: relative;
        z-index: 10;
        overflow-x: hidden;
      }
      .split-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 4rem;
        max-width: 600px;
        position: relative;
        z-index: 20;
        background: var(--bg2);
      }
      .split-left {
        flex: 1.2;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .edu-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.8) contrast(1.1);
        transform: scale(1.05);
        animation: slowZoom 20s infinite alternate linear;
      }
      @keyframes slowZoom {
        0% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1.15);
        }
      }
      .wave-divider {
        position: absolute;
        right: -1px;
        top: 0;
        bottom: 0;
        width: 150px;
        height: 100%;
        z-index: 5;
        pointer-events: none;
      }
      .wave-divider svg {
        width: 100%;
        height: 100%;
      }
      .wave-divider svg path {
        fill: var(--bg2) !important;
      }
      .wave-mobile {
        display: none;
      }
      .auth-content {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        animation: modalIn 1s var(--spring) both;
      }
      .auth-title {
        font-size: 2.2rem;
        font-weight: 900;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #fff, var(--text2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      @media (max-width: 900px) {
        .split-layout {
          flex-direction: column;
          overflow-y: visible;
          overflow-x: hidden;
        }
        .split-left {
          min-height: 250px;
          flex: none;
          width: 100%;
          order: -1;
        }
        .split-right {
          padding: 2rem 1.5rem;
          max-width: 100%;
          justify-content: flex-start;
          background: var(--bg2);
          flex: 1;
          margin: 0;
          box-sizing: border-box;
        }
        .wave-divider {
          width: 100%;
          height: 60px;
          right: 0;
          left: 0;
          top: auto;
          bottom: -1px;
          transform: none;
        }
        .wave-desktop {
          display: none;
        }
        .wave-mobile {
          display: block;
        }
        .auth-content {
          margin-top: -10px;
          width: 100%;
          max-width: 100%;
          box-sizing: border-box;
        }
        .edu-img {
          mask-image: linear-gradient(to bottom, black 60%, transparent);
          -webkit-mask-image: linear-gradient(
            to bottom,
            black 60%,
            transparent
          );
        }
      }
    
      .bottom-noise-left, .bottom-noise-right {
        position: fixed;
        bottom: 0;
        width: 350px;
        height: 350px;
        background-image: radial-gradient(#3b82f6 2px, transparent 2px);
        background-size: 20px 20px;
        opacity: 0.2;
        pointer-events: none;
        z-index: -1;
      }
      .bottom-noise-left {
        left: 0;
        mask-image: radial-gradient(circle at bottom left, black, transparent 70%);
        -webkit-mask-image: radial-gradient(circle at bottom left, black, transparent 70%);
      }
      .bottom-noise-right {
        right: 0;
        mask-image: radial-gradient(circle at bottom right, black, transparent 70%);
        -webkit-mask-image: radial-gradient(circle at bottom right, black, transparent 70%);
      }
    </style>
  </head>
